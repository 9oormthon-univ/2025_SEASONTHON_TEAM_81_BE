spring:
  config:
    activate:
      on-profile: "datasource"
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST}:3306/mindwalk_db
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  sql:
    init:
      mode: always
      data-locations: classpath:healing_content.sql