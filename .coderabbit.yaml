# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: 'ko-KR' # 한국말로 설정
early_access: false # 베타 기능 비활성화
reviews:
  poem: false # PR에 시 생성 비활성화
  suggested_reviewers: false # 리뷰어 추천 비활성화
  suggested_labels: false # PR에 라벨 추천 비활성화
  collapse_walkthrough: true # 긴 리뷰는 접어서 표시
  auto_review:
    enabled: true # 자동 리뷰 활성화
chat:
  auto_reply: true # 질문에 자동 응답 활성화
